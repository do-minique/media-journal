{% extends "layout.html" %}

{% block title %}Edit review{% endblock %}


{% block content %}


<body>
  <div class="nav">
<!-- User can navigate back to the home page-->
      <p>
    <a href="/">Cancel</a>
  </p>
  </div>
  <div class="content">
<!-- Form for editing entries-->
  <form action="/editreview/{{ review.id }}" method="post">
    <p>
      
    </p>
    <p>
      <label for="rating">Rating</label>
<select name="rating" id="rating" required>
  {% for i in range(1, 11) %}
    <option value="{{ i }}" {% if i == review.rating %}selected{% endif %}>
      {{ i }}
    </option>
  {% endfor %}
</select>
    <p>
<textarea rows="10" cols="50" id="comment" name="comment" maxlength="5000" required>{{ review.comment }}</textarea>
    </p>
     <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" />
    <input type="submit" value="Save changes" />
  </form>
  </div>
          {% for message in get_flashed_messages() %}
  <p>
    <b>{{ message }}</b>
  </p>
  {% endfor %}
</body>
{% endblock %}
</html>
