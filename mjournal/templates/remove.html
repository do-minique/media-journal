 <!DOCTYPE html>
<html>
<!-- This page shows a confirmation message for deleting entries -->
<head>
  <link rel="stylesheet" href="/static/main.css">
  <title>Delete entry</title>
</head>
 
<body>
  <div class="content">
 <form action="/remove/{{ entry.id }}" method="post">
    <p>
      This entry will be deleted. Proceed?
    </p>
    <input type="submit" name="continue" value="Yes, delete" />
    <input type="submit" name="cancel" value="Cancel" />
  </form>
    </div>
</body>
