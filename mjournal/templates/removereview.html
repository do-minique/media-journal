 <!DOCTYPE html>
<html>
<!-- This page shows a confirmation message for deleting reviews -->
<head>
  <link rel="stylesheet" href="/static/main.css">
  <title>Delete review</title>
</head>
 
<body>
  <div class="content">
 <form action="/removereview/{{ review.id }}" method="post">
    <p>
      This review will be deleted. Proceed?
    </p>
    <input type="submit" name="continue" value="Yes, delete" />
    <input type="submit" name="cancel" value="Cancel" />
  </form>
    </div>
</body>
