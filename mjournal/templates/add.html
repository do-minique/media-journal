{% extends "layout.html" %}

{% block title %}New entry{% endblock %}


{% block content %}
<body>
  <div class="content">
<!-- Form for adding entries-->
  <form action="/add" method="post">
    <p>
      Name:
      <input type="text" name="name" required/>
    </p>
    <p>
      <input type="radio" name="type" value="1" required/> Book
      <input type="radio" name="type" value="2" /> Movie
      <input type="radio" name="type" value="3" /> TV show
    </p>
    <p>
      Release year:
      <input type="text" name="release_year" required/>
    </p>
      <p>Genres:</p>
  {% for genre in genres %}
    <label>
      <input type="checkbox" name="genre_ids" value="{{ genre.id }}">
      {{ genre.name }}
    </label><br>
  {% endfor %}
    <p>
      <!--<input type="text" name="description" required/>-->
      <textarea rows="5" cols="25" name="description" required placeholder="Write a description here"></textarea>
    </p>
    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" />
    <input type="submit" value="Submit" />
  </form>
  </div>
</body>
{% endblock %}
</html>
