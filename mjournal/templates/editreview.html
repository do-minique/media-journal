<!DOCTYPE html>
<html>
<!-- This page allows logged in users to edit reviews -->
<head>
  <link rel="stylesheet" href="/static/main.css">
  <title>Edit review</title>
</head>

<body>
  <div class="nav">
<!-- User can navigate back to the home page-->
      <p>
    <a href="/">Cancel</a>
  </p>
  </div>
  <div class="content">
<!-- Form for editing entries-->
  <form action="/editreview/{{ review.id }}" method="post">
    <p>
      
    </p>
    <p>
      <label for="rating">Rating</label>
<select name="rating" id="rating" required>
  {% for i in range(1, 11) %}
    <option value="{{ i }}" {% if i == review.rating %}selected{% endif %}>
      {{ i }}
    </option>
  {% endfor %}
</select>
    <p>
<textarea rows="10" cols="50" name="comment" required>{{ review.comment }}</textarea>
    </p>
    <input type="submit" value="Save changes" />
  </form>
  </div>
</body>

</html>
