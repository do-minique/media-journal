<!DOCTYPE html>
<html>
<!-- This page allows logged in users to add new entries -->
<head>
  <link rel="stylesheet" href="/static/main.css">
  <title>Add entry</title>
</head>

<body>
  <div class="nav">
<!-- User can navigate back to the home page-->
      <p>
    <a href="/">Cancel</a>
  </p>
  </div>
  <div class="content">
<!-- Form for adding entries-->
  <form action="/added" method="post">
    <p>
      Name:
      <input type="text" name="name" required/>
    </p>
    <p>
      <input type="radio" name="type" value="1" required/> Book
      <input type="radio" name="type" value="2" /> Movie
      <input type="radio" name="type" value="3" /> TV show
    </p>
    <p>
      Release year:
      <input type="text" name="release_year" required/>
    </p>
    <p>
      Description:
      <input type="text" name="description" required/>
    </p>
    <input type="submit" value="Submit" />
  </form>
  </div>
</body>

</html>
